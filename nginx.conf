server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;



    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

}
